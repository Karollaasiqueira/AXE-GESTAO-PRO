databases:
  - name: axe-gestao-db
    plan: free
    databaseName: axe_gestao_pro
    user: axe_user

services:
  - type: web
    name: axe-gestao-pro
    plan: free
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: axe-gestao-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
